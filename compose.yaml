services:
  postgres:
    image: postgres:16-alpine
    container_name: drag-visual-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: drag_visual
    ports:
      - "5432:5432"
    volumes:
      - drag-visual-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d drag_visual"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  drag-visual-postgres-data:
